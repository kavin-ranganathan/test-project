name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and metadata
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "Diff size: $(wc -c < pr_diff.txt) bytes"
          git diff origin/${{ github.base_ref }}...HEAD --name-only > changed_files.txt
          echo "Files changed:"
          cat changed_files.txt

      - name: Truncate diff if too large
        run: |
          MAX_BYTES=80000
          ACTUAL=$(wc -c < pr_diff.txt)
          if [ "$ACTUAL" -gt "$MAX_BYTES" ]; then
            echo "Diff too large ($ACTUAL bytes), truncating..."
            head -c $MAX_BYTES pr_diff.txt > pr_diff_truncated.txt
            echo "" >> pr_diff_truncated.txt
            echo "[DIFF TRUNCATED - first $MAX_BYTES bytes only]" >> pr_diff_truncated.txt
            mv pr_diff_truncated.txt pr_diff.txt
          fi

      - name: Build payload and call API and post review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          cat > review_bot.py << 'ENDOFPYTHON'
          import json, os, subprocess, urllib.request, urllib.error

          # --- Read inputs ---
          diff = open("pr_diff.txt", "r", errors="replace").read()
          changed_files = open("changed_files.txt", "r").read().strip()

          pr_title  = os.environ.get("PR_TITLE", "")
          pr_body   = os.environ.get("PR_BODY", "") or "No description provided."
          pr_author = os.environ.get("PR_AUTHOR", "")
          base      = os.environ.get("BASE_BRANCH", "main")
          head      = os.environ.get("HEAD_BRANCH", "")
          api_key   = os.environ["OPENROUTER_API_KEY"]
          repo      = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          run_id    = os.environ["GITHUB_RUN_ID"]
          server_url = os.environ["GITHUB_SERVER_URL"]

          # --- Build prompt ---
          prompt = (
              "You are a senior software engineer conducting a thorough code review. "
              "Be direct, specific, and genuinely helpful.\n\n"
              "## PR Context\n"
              f"- Title: {pr_title}\n"
              f"- Author: {pr_author}\n"
              f"- Branch: {head} into {base}\n"
              f"- Description: {pr_body}\n"
              f"- Files changed:\n{changed_files}\n\n"
              f"## Diff\n{diff}\n\n"
              "---\n\n"
              "## Your Review\n\n"
              "For each issue found, include the exact file path and line number, "
              "what the problem is, why it matters, and a concrete fix.\n\n"
              "---\n\n"
              "### 1. Bugs and Logic Errors\n"
              "Look for: off-by-one errors, incorrect conditionals, null/undefined dereferences, "
              "race conditions, incorrect error handling, unhandled edge cases (empty arrays, zero values, "
              "large inputs), incorrect assumptions about API responses, wrong state mutations, "
              "functions that do not do what their name suggests.\n\n"
              "### 2. Security Vulnerabilities\n"
              "Look for: injection risks (SQL, NoSQL, command, XSS, template), auth bypasses, "
              "hardcoded secrets/API keys/passwords, sensitive data in logs or errors, IDOR, "
              "missing input validation, unsafe deserialisation, broken access control, "
              "CSRF on state-changing endpoints, insecure dependencies.\n\n"
              "### 3. Performance Issues\n"
              "Look for: N+1 database queries, missing indexes, unnecessary re-renders (frontend), "
              "blocking sync I/O in async contexts, large payloads loaded into memory, "
              "missing pagination, expensive operations in hot paths, missing caching.\n\n"
              "### 4. Code Quality and Best Practices\n"
              "Look for: functions doing too many things, deep nesting, magic numbers/strings, "
              "code duplication, dead code, unclear naming, inadequate error messages, "
              "overly complex logic, violations of existing codebase patterns.\n\n"
              "### 5. Testing Gaps\n"
              "Look for: new code with no tests, untested edge cases, happy-path-only tests, "
              "tests testing implementation not behaviour, missing integration tests, "
              "hard-coded test data that should be parameterised.\n\n"
              "### 6. Maintainability and Documentation\n"
              "Look for: public APIs with no docstring, complex algorithms with no explanation, "
              "missing README updates, misleading or outdated comments, "
              "breaking changes with no migration notes.\n\n"
              "### 7. Suggestions (Non-blocking)\n"
              "Improvements worth considering but not critical. Label as optional.\n\n"
              "---\n\n"
              "### Summary\n"
              "End with:\n"
              "- Verdict: Approve / Request Changes / Needs Significant Rework\n"
              "- Critical issues found: (count)\n"
              "- Top 3 things to fix before merging (if any)\n\n"
              "---\n\n"
              "Be honest. If the code is solid, say so. Do not manufacture feedback. "
              "If something is well done, call it out. "
              "Do NOT flag pure style/formatting issues that a linter would catch."
          )

          # --- Call OpenRouter ---
          payload = json.dumps({
              "model": "anthropic/claude-sonnet-4-6",
              "max_tokens": 8192,
              "messages": [{"role": "user", "content": prompt}]
          }).encode("utf-8")

          print(f"Payload size: {len(payload)} bytes")

          req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "HTTP-Referer": f"https://github.com/{repo}",
                  "X-Title": "Claude PR Review Bot"
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"API error {e.code}: {body}")
              raise SystemExit(1)

          review = data["choices"][0]["message"]["content"]
          usage = data.get("usage", {})
          print(f"Tokens - prompt: {usage.get('prompt_tokens', '?')}, "
                f"completion: {usage.get('completion_tokens', '?')}")
          print(f"Review: {len(review.split())} words")

          # --- Post comment on PR ---
          comment_body = (
              "## Claude Code Review\n\n"
              f"{review}\n\n"
              "---\n"
              f"*Powered by Claude Sonnet via OpenRouter | "
              f"[View run]({server_url}/{repo}/actions/runs/{run_id})*"
          )

          comment_payload = json.dumps({"body": comment_body})

          result = subprocess.run(
              [
                  "gh", "api",
                  f"repos/{repo}/issues/{pr_number}/comments",
                  "-H", "Accept: application/vnd.github+json",
                  "--input", "-"
              ],
              input=comment_payload,
              text=True,
              capture_output=True
          )

          if result.returncode != 0:
              print(f"Failed to post comment: {result.stderr}")
              raise SystemExit(1)

          print("Review posted successfully")
          ENDOFPYTHON
          python3 review_bot.py
