name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Run Claude Review via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat pr_diff.txt)

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "anthropic/claude-sonnet-4-6",
              "messages": [{
                "role": "user",
                "content": "Review this PR diff. Focus on bugs, security issues, performance, missing tests. Be specific with file paths and line numbers. Skip nitpicks.\n\n'"$DIFF"'"
              }]
            }')

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          # Post as PR comment
          gh api repos/$REPO/issues/$PR_NUMBER/comments \
            -f body="## Claude Code Review\n\n$REVIEW"
